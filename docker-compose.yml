version: '3.8'

services:
  snake-update-server:
    build: .
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - BASE_URL=http://localhost:5000
      - LOG_LEVEL=INFO
    volumes:
      - ./updates:/app/updates
      - ./version.json:/app/version.json
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s